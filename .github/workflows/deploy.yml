name: Build, Release & Publish Extensions

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'website/**'
      - '.github/**'
      - '.gitignore'
      - '*.md'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  DIRECTORY: .output
  PROJECT_NAME: actual-budget-tweaks

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Configure Git
        run: |
          git config user.email "github-actions@users.noreply.github.com"
          git config user.name "GitHub Actions"

      - name: Install dependencies
        run: pnpm install

      - name: Bump version & update changelog
        id: version
        run: |
          npx changelogen@latest --release --push --no-tag=false
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Build & Zip Extensions
        run: |
          pnpm zip
          pnpm zip:firefox

      - name: Create GitHub Release from Changelog
        run: |
          npx changelogen@latest gh release ${{ steps.version.outputs.new_version }} --token ${{ github.token }}

      - name: Sign Firefox XPI for sideloading
        timeout-minutes: 10
        continue-on-error: true
        run: |
          npx web-ext sign \
            --source-dir .output/firefox-mv2 \
            --artifacts-dir .output \
            --channel unlisted \
            --api-key ${{ secrets.FIREFOX_JWT_ISSUER }} \
            --api-secret ${{ secrets.FIREFOX_JWT_SECRET }}
          # Rename to predictable filename
          mv .output/*.xpi .output/actual-budget-tweaks-${{ steps.version.outputs.new_version }}.xpi || true

      - name: Upload artifacts to GitHub Release
        run: |
          gh release upload v${{ steps.version.outputs.new_version }} \
            .output/*-chrome.zip \
            .output/*-firefox.zip \
            .output/*.xpi || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Firefox auto-update manifest
        run: |
          VERSION=${{ steps.version.outputs.new_version }}
          XPI_URL="https://github.com/aelxxs/actual-budget-tweaks/releases/download/v${VERSION}/actual-budget-tweaks-${VERSION}.xpi"
          cat > website/public/updates.json << EOF
          {
            "addons": {
              "{423a1e86-3efa-4421-a7e8-65fb5786415e}": {
                "updates": [
                  {
                    "version": "${VERSION}",
                    "update_link": "${XPI_URL}"
                  }
                ]
              }
            }
          }
          EOF
          git add website/public/updates.json
          git commit -m "chore: update Firefox auto-update manifest for v${VERSION}" || true
          git push || true

      - name: Submit to Chrome Web Store
        continue-on-error: true
        run: |
          pnpm wxt submit \
            --chrome-zip .output/*-chrome.zip
        env:
          CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
