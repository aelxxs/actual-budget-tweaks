name: Deploy Website

on:
  push:
    branches: [main]
  workflow_dispatch:
  workflow_run:
    # deploy.yml commits the version bump and updates.json using GITHUB_TOKEN,
    # which GitHub doesn't treat as a push trigger for other workflows — so we
    # redeploy off this workflow's completion instead of relying on that push.
    workflows: ["Build, Release & Publish Extensions"]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: website/pnpm-lock.yaml
      - run: pnpm install
        working-directory: website
      - run: pnpm build
        working-directory: website
      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
