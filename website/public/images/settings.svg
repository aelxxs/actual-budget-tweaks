<svg xmlns="http://www.w3.org/2000/svg" width="640" height="480" viewBox="0 0 640 480">
  <rect width="640" height="480" fill="#1e1f30" rx="12"/>
  <!-- Header -->
  <text x="32" y="40" font-family="sans-serif" font-size="15" font-weight="bold" fill="#e4e5eb">Interface Settings</text>
  <text x="186" y="40" font-family="sans-serif" font-size="15" fill="#8b8fa3"> — Configure Actual</text>
  <!-- Theme -->
  <text x="32" y="80" font-family="sans-serif" font-size="12" font-weight="bold" fill="#e4e5eb">Theme</text>
  <rect x="32" y="90" width="576" height="34" rx="4" fill="#2a2b3d" stroke="#3a3b4d" stroke-width="1"/>
  <text x="44" y="112" font-family="sans-serif" font-size="13" fill="#e4e5eb">Mocha</text>
  <text x="588" y="112" font-family="sans-serif" font-size="11" fill="#8b8fa3" text-anchor="end">▾</text>
  <!-- Row: Pattern, Radius, Height -->
  <text x="32" y="156" font-family="sans-serif" font-size="12" font-weight="bold" fill="#e4e5eb">Background Pattern</text>
  <rect x="32" y="166" width="180" height="30" rx="4" fill="#2a2b3d" stroke="#3a3b4d" stroke-width="1"/>
  <text x="44" y="186" font-family="sans-serif" font-size="12" fill="#e4e5eb">Polka Dots 2</text>
  <text x="218" y="156" font-family="sans-serif" font-size="12" font-weight="bold" fill="#e4e5eb">Border Radius</text>
  <rect x="218" y="166" width="180" height="30" rx="4" fill="#2a2b3d" stroke="#3a3b4d" stroke-width="1"/>
  <text x="230" y="186" font-family="sans-serif" font-size="12" fill="#e4e5eb">Medium (0.5rem)</text>
  <text x="414" y="156" font-family="sans-serif" font-size="12" font-weight="bold" fill="#e4e5eb">Row Height</text>
  <rect x="414" y="166" width="180" height="30" rx="4" fill="#2a2b3d" stroke="#3a3b4d" stroke-width="1"/>
  <text x="426" y="186" font-family="sans-serif" font-size="12" fill="#e4e5eb">Normal (Default)</text>
  <!-- Toggles -->
  <g transform="translate(32, 230)">
    <rect x="0" y="0" width="16" height="16" rx="3" fill="#50c878"/>
    <text x="0" y="11" font-family="sans-serif" font-size="10" fill="#fff" text-anchor="middle" transform="translate(8,0)">✓</text>
    <text x="24" y="13" font-family="sans-serif" font-size="12" fill="#e4e5eb">Color Negative Account Balances</text>
  </g>
  <g transform="translate(340, 230)">
    <rect x="0" y="0" width="16" height="16" rx="3" fill="#50c878"/>
    <text x="0" y="11" font-family="sans-serif" font-size="10" fill="#fff" text-anchor="middle" transform="translate(8,0)">✓</text>
    <text x="24" y="13" font-family="sans-serif" font-size="12" fill="#e4e5eb">Color Transactions</text>
  </g>
  <g transform="translate(32, 260)">
    <rect x="0" y="0" width="16" height="16" rx="3" fill="#50c878"/>
    <text x="0" y="11" font-family="sans-serif" font-size="10" fill="#fff" text-anchor="middle" transform="translate(8,0)">✓</text>
    <text x="24" y="13" font-family="sans-serif" font-size="12" fill="#e4e5eb">Hide Month Selection On Scroll</text>
  </g>
  <g transform="translate(340, 260)">
    <rect x="0" y="0" width="16" height="16" rx="3" fill="#50c878"/>
    <text x="0" y="11" font-family="sans-serif" font-size="10" fill="#fff" text-anchor="middle" transform="translate(8,0)">✓</text>
    <text x="24" y="13" font-family="sans-serif" font-size="12" fill="#e4e5eb">Show Daily Available</text>
  </g>
  <g transform="translate(32, 290)">
    <rect x="0" y="0" width="16" height="16" rx="3" fill="#50c878"/>
    <text x="0" y="11" font-family="sans-serif" font-size="10" fill="#fff" text-anchor="middle" transform="translate(8,0)">✓</text>
    <text x="24" y="13" font-family="sans-serif" font-size="12" fill="#e4e5eb">Improved Sidebar Design</text>
  </g>
  <g transform="translate(340, 290)">
    <rect x="0" y="0" width="16" height="16" rx="3" fill="#50c878"/>
    <text x="0" y="11" font-family="sans-serif" font-size="10" fill="#fff" text-anchor="middle" transform="translate(8,0)">✓</text>
    <text x="24" y="13" font-family="sans-serif" font-size="12" fill="#e4e5eb">Account Icons</text>
  </g>
  <!-- Placeholder label -->
  <text x="320" y="440" font-family="sans-serif" font-size="11" fill="#3a3b4d" text-anchor="middle">Screenshot placeholder</text>
</svg>
